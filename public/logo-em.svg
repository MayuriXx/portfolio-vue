<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6B9080"/>
            <stop offset="100%" style="stop-color:#A4C3B2"/>
        </linearGradient>
        <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#EAF4F4"/>
            <stop offset="100%" style="stop-color:#F6FFF8"/>
        </linearGradient>
    </defs>

    <!-- Background rounded square -->
    <rect width="100" height="100" rx="22" fill="url(#bg)"/>

    <!-- Subtle inner border -->
    <rect x="3" y="3" width="94" height="94" rx="19" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

    <!-- E -->
    <!-- Vertical bar -->
    <rect x="14" y="28" width="7" height="44" rx="2" fill="url(#text-grad)"/>
    <!-- Top bar -->
    <rect x="14" y="28" width="24" height="7" rx="2" fill="url(#text-grad)"/>
    <!-- Middle bar -->
    <rect x="14" y="47" width="19" height="6" rx="2" fill="url(#text-grad)"/>
    <!-- Bottom bar -->
    <rect x="14" y="65" width="24" height="7" rx="2" fill="url(#text-grad)"/>

    <!-- M -->
    <!-- Left vertical -->
    <rect x="47" y="28" width="7" height="44" rx="2" fill="url(#text-grad)"/>
    <!-- Right vertical -->
    <rect x="79" y="28" width="7" height="44" rx="2" fill="url(#text-grad)"/>
    <!-- Left diagonal (top-left to center) -->
    <polygon points="47,28 54,28 66.5,52 59.5,52" fill="url(#text-grad)"/>
    <!-- Right diagonal (top-right to center) -->
    <polygon points="86,28 79,28 66.5,52 73.5,52" fill="url(#text-grad)"/>
</svg>
